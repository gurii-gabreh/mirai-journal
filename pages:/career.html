<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>キャリア候補 — Mirai Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon"><i class="ti ti-compass"></i></span>
          <span class="logo-text">Mirai<br><em>Journal</em></span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">メイン</div>
        <a href="../index.html" class="nav-item"><i class="ti ti-layout-dashboard"></i><span>ダッシュボード</span></a>
        <a href="journal.html" class="nav-item"><i class="ti ti-pencil"></i><span>今日のジャーナル</span></a>
        <a href="analysis.html" class="nav-item"><i class="ti ti-chart-radar"></i><span>自己分析</span></a>
        <a href="trends.html" class="nav-item"><i class="ti ti-world-search"></i><span>トレンド記録</span></a>
        <a href="career.html" class="nav-item active"><i class="ti ti-rocket"></i><span>キャリア候補</span></a>
        <div class="nav-section-label">設定</div>
        <a href="settings.html" class="nav-item"><i class="ti ti-settings"></i><span>API設定</span></a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <button class="menu-toggle" id="menuToggle"><i class="ti ti-menu-2"></i></button>
        <div class="header-title"><h1>キャリア候補</h1><span class="header-date">AIが蓄積データから提案</span></div>
      </header>

      <div class="content-body">
        <div class="card">
          <div class="card-header">
            <h2><i class="ti ti-rocket"></i>あなただけができる業種・キャリア</h2>
          </div>
          <div id="careerFull">
            <div class="empty-state">
              <i class="ti ti-rocket-off"></i>
              <p>ジャーナルを複数回記録すると<br>あなた専用のキャリア候補が提案されます</p>
              <a href="journal.html" class="btn-primary">ジャーナルを書く</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/storage.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('menuToggle');
      const sidebar = document.getElementById('sidebar');
      if (toggle && sidebar) toggle.addEventListener('click', () => sidebar.classList.toggle('open'));
      const careers = Storage.getCareers();
      const el = document.getElementById('careerFull');
      if (!el || !careers.length) return;
      el.innerHTML = careers.map((c, i) => `
        <div style="padding:1rem;border-bottom:1px solid var(--border);">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
            <span style="font-size:22px;font-weight:700;color:var(--text-muted);width:32px;">${i+1}</span>
            <span style="font-size:16px;font-weight:500;">${esc(c.name)}</span>
            <span class="career-score-badge" style="margin-left:auto;">適合${c.score}%</span>
          </div>
          <div style="font-size:13px;color:var(--text-secondary);padding-left:42px;line-height:1.7;">${esc(c.reason||'')}</div>
        </div>
      `).join('');
    });
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
