<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>トレンド記録 — Mirai Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon"><i class="ti ti-compass"></i></span>
          <span class="logo-text">Mirai<br><em>Journal</em></span>
        </div>
      </div>
      <nav class="sidebar-nav">
                <div class="nav-section-label">メイン</div>
        <a href="../index.html" class="nav-item"><i class="ti ti-layout-dashboard"></i><span>ダッシュボード</span></a>
        <a href="journal.html" class="nav-item"><i class="ti ti-pencil"></i><span>今日のジャーナル</span></a>
        <a href="goals.html" class="nav-item"><i class="ti ti-target"></i><span>目標一覧</span></a>
        <a href="analysis.html" class="nav-item"><i class="ti ti-chart-radar"></i><span>自己分析</span></a>
        <a href="trends.html" class="nav-item active"><i class="ti ti-world-search"></i><span>トレンド記録</span></a>
        <a href="career.html" class="nav-item"><i class="ti ti-rocket"></i><span>キャリア候補</span></a>
        <a href="weekly.html" class="nav-item"><i class="ti ti-calendar-stats"></i><span>週次レポート</span></a>
        <div class="nav-section-label">設定</div>
        <a href="settings.html" class="nav-item"><i class="ti ti-settings"></i><span>API設定</span></a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <button class="menu-toggle" id="menuToggle"><i class="ti ti-menu-2"></i></button>
        <div class="header-title"><h1>トレンド記録</h1><span class="header-date">ジャーナルから自動抽出</span></div>
      </header>

      <div class="content-body">
        <div class="card">
          <div class="card-header">
            <h2><i class="ti ti-world"></i>記録されたトレンド・問題点</h2>
            <span style="font-size:12px;color:var(--text-muted);" id="trendTotal"></span>
          </div>
          <!-- フィルター -->
          <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;">
            <button class="chip selected" onclick="filterTrends('all',this)">すべて</button>
            <button class="chip" onclick="filterTrends('高',this)">関連度：高</button>
            <button class="chip" onclick="filterTrends('中',this)">関連度：中</button>
            <button class="chip" onclick="filterTrends('低',this)">関連度：低</button>
          </div>
          <div id="trendListFull">
            <div class="empty-state">
              <i class="ti ti-world-off"></i>
              <p>ジャーナルを記録するとトレンドが自動抽出されます</p>
              <a href="journal.html" class="btn-primary">ジャーナルを書く</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/storage.js"></script>
  <script>
    let allTrends = [];
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('menuToggle');
      const sidebar = document.getElementById('sidebar');
      if (toggle && sidebar) toggle.addEventListener('click', () => sidebar.classList.toggle('open'));
      allTrends = Storage.getTrends();
      renderTrends(allTrends);
      const el = document.getElementById('trendTotal');
      if (el) el.textContent = `計${allTrends.length}件`;
    });

    function filterTrends(rel, btn) {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      btn.classList.add('selected');
      const filtered = rel === 'all' ? allTrends : allTrends.filter(t => t.relevance === rel);
      renderTrends(filtered);
    }

    function renderTrends(trends) {
      const el = document.getElementById('trendListFull');
      if (!el) return;
      if (!trends.length) { el.innerHTML = '<div class="empty-state"><i class="ti ti-filter-off"></i><p>該当するトレンドがありません</p></div>'; return; }
      el.innerHTML = trends.map(t => `
        <div class="trend-item">
          <span class="trend-relevance ${relClass(t.relevance)}">${t.relevance||'中'}</span>
          <div class="trend-body">
            <div class="trend-title">${esc(t.title)}</div>
            <div class="trend-meta">${esc(t.insight||'')} · ${t.date ? new Date(t.date).toLocaleDateString('ja-JP') : ''}</div>
          </div>
        </div>
      `).join('');
    }

    function relClass(r) { return r==='高'?'relevance-high':r==='中'?'relevance-mid':'relevance-low'; }
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
